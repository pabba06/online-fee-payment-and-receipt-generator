<!DOCTYPE html>
<html>

<head>

<title>ABC College Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
}

h2{
text-align:center;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ccc;
text-align:center;
}

th{
background:#8B0000;
color:white;
}

form{
text-align:center;
margin-bottom:20px;
}

button{
padding:8px 15px;
margin:5px;
}

</style>

</head>

<body>

<h2>ABC College Fee Payment Admin Dashboard</h2>


<div style="text-align:center;margin-bottom:20px;">

<a href="/daily">
<button>Daily Collection</button>
</a>

<a href="/monthly">
<button>Monthly Collection</button>
</a>

<a href="/download">
<button>Download Payments</button>
</a>

</div>


<form method="GET" action="/admin">

Roll No :
<input type="text" name="roll">

Fee Type :
<select name="fee_type">
<option value="">All</option>
<option value="Tuition">Tuition</option>
<option value="Bus">Bus</option>
<option value="Library">Library</option>
<option value="Hostel">Hostel</option>
</select>

Date :
<input type="date" name="date">
From: 
<input type="date" name="from_date">
To: 
<input type="date" name="to_date">
<button type="submit">Filter</button>

</form>

<a href="/admin_logout">Logout</a>
<br><br>
<a href="/graph">Daily Graph</a>
<br>
<a href="/monthly_graph">Monthly Graph</a>
<br><br>
<a href="/pie_chart">Fee Type Chart</a>
<table>

<tr>
<th>ID</th>
<th>Receipt No</th>
<th>Roll</th>
<th>Fee Type</th>
<th>Amount</th>
<th>Date & Time</th>
<th>Action</th>
</tr>

{% for p in data %}

<tr>
<td>{{p[0]}}</td>
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>
<td>{{p[3]}}</td>
<td>{{p[4]}}</td>
<td>{{p[5]}}</td>
<td>
        <a href="/delete/{{p[0]}}" onclick="return confirm('Are you sure you want to delete this transaction?')">
            Delete
        </a>
    </td>
</tr>

{% endfor %}

</table>
</body>
</html>
