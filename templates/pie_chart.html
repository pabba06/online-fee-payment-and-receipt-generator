<h2>Fee Type Distribution</h2>

<canvas id="pieChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
var ctx = document.getElementById('pieChart').getContext('2d');

var chart = new Chart(ctx, {
    type: 'pie',
    data: {
        labels: {{ labels | safe }},
        datasets: [{
            data: {{ values | safe }}
        }]
    }
});
</script>
