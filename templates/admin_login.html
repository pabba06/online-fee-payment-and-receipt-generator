<h2 style="text-align:center;">Admin Login</h2>

<div style="
    width:300px;
    margin:50px auto;
    padding:20px;
    border:1px solid #ccc;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
    text-align:center;
">

    <form method="POST">

        <input type="text" name="username" placeholder="Username"
        style="width:90%; padding:8px; margin:10px;"><br>

        <input type="password" name="password" placeholder="Password"
        style="width:90%; padding:8px; margin:10px;"><br>

        <button type="submit"
        style="padding:8px 20px; background:blue; color:white; border:none;">
            Login
        </button>

    </form>

</div>
